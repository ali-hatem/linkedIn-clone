<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="main">
    <div class="signup-card">

      <div class="card active">
        <h1 class="title mb-4">join let's link now — it's free!</h1>
        
        <!-- Google Sign Up -->
        <button class="btn-google">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google"/>
          Continue with Google
        </button>

        <div class="or-divider">or</div>

        <div class="form-item">
          <label class="form-label" for="emailInput">Email address</label>
          <input
            type="email"
            id="emailInput"
            placeholder="e.g. john@example.com"
            autocomplete="email"
          />
          <div class="field-error" id="emailError"></div>
        </div>
        <div class="form-item">
          <label class="form-label" for="passwordInput">Password</label>
          <div class="pw-container">
            <input
              type="password"
              id="passwordInput"
              placeholder="Password"
            />
            <span class="links show-pw">show</span>
          </div>
          <div class="field-error" id="passwordError"></div>
        </div>

        <p>
          By clicking Agree &amp; Join, you agree to the LinkedIn
          <a href="#">User Agreement</a>, <a href="#">Privacy Policy</a>,
          and <a href="#">Cookie Policy</a>.
        </p>
        <button class="submit-btn mb-4">Agree &amp; Join</button>


        <div class="login-link">
          Already on Let's link? <a href="#" class="links">Sign in</a>
        </div>
      </div>
    </div>
    </div>


  </body>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/scripte.js"></script>
</html>
