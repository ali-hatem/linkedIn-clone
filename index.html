<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="vh-100 d-flex justify-content-center align-items-center flex-wrap">
    <div>
        <div class="container form-holder p-4 rounded-3">
            <form>
                <div class="mb-3">
                    <input type="email" class="form-control" id="signin-email-input" aria-describedby="emailHelp" placeholder="Email address" required>
                </div>
                <div class="mb-3">
                    <input type="password" placeholder="Password" class="form-control" id="signin-password-input" required>
                </div>
                <div class="mb-3">
                    <a href="" class="links" id="fogot-password">forgot password?</a>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="exampleCheck1">
                    <label class="form-check-label" for="exampleCheck1">keep me signed in</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-5" id="signin-btn">Join Now</button>
            </form>
        </div>
        <p class="w-100 pt-4 text-center">new to linkedIn <a href="" class="links" id="switch-to-signup"> sign up</a></p>
    </div>
    </div>
        
        
        
    </body>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/scripte.js"></script>
    </html>
